name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: intl, json, mbstring, pdo, pdo_sqlite, sqlite3, gd, zip
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Configure environment
        run: |
          cp env .env
          echo "CI_ENVIRONMENT = testing" >> .env
          echo "app.baseURL = http://localhost/" >> .env

      - name: Prepare writable directories
        run: mkdir -p writable/{cache,logs,session,uploads,tmp} && chmod -R 777 writable/

      - name: Prepare build directories
        run: mkdir -p build/logs

      - name: Run Unit tests
        run: vendor/bin/phpunit --testsuite Unit --no-coverage

      - name: Run Model tests
        run: vendor/bin/phpunit --testsuite Model --no-coverage

      - name: Run Feature tests
        run: vendor/bin/phpunit --testsuite Feature --no-coverage

      - name: Run Integration tests
        run: vendor/bin/phpunit --testsuite Integration --no-coverage

      - name: Generate coverage report (PHP 8.2 only)
        if: matrix.php-version == '8.2'
        run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Upload coverage to Codecov
        if: matrix.php-version == '8.2'
        uses: codecov/codecov-action@v4
        with:
          files: build/logs/clover.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
